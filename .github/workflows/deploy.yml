name: Deploy Cuadre a Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Escribir credenciales
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$SA_KEY" | base64 -d > service-account.json

      - name: Deploy a Firebase Hosting
        run: firebase deploy --only hosting --project cuadre-app-59c7f
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
